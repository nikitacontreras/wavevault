name: Build and Release

on:
  push:
    branches:
      - main
      - feat/update

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    # Evitar bucles: no ejecutar si el último commit fue un bump automático
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Git Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(pnpm version patch -m "chore: bump version to %s [skip ci]")
          git push origin HEAD --follow-tags
          echo "new_tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG=${{ steps.bump.outputs.new_tag }}
          echo "Looking for last successful release..."
          LAST_SUCCESSFUL=$(gh api "repos/${{ github.repository }}/releases?per_page=20" --jq '[.[] | select(.assets | length > 0)][0].tag_name')
          
          if [ "$LAST_SUCCESSFUL" != "null" ] && [ ! -z "$LAST_SUCCESSFUL" ]; then
            PREV_TAG=$LAST_SUCCESSFUL
          else
            PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          fi
          
          echo "## Cambios en $NEW_TAG" > release_notes.md
          echo "" >> release_notes.md
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" $NEW_TAG >> release_notes.md
          else
            git log --pretty=format:"- %s (%h)" $PREV_TAG..$NEW_TAG >> release_notes.md
          fi
      
      - name: Save Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  build:
    name: Build (${{ matrix.os }})
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Free Disk Space (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
          cache: true

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Dependencies
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            pnpm install -g node-gyp
          fi
          pnpm install --no-frozen-lockfile
        shell: bash

      - name: Build Application
        run: pnpm run build
        shell: bash

      - name: Package Application
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            npx electron-builder --mac --x64 --arm64
          elif [ "${{ runner.os }}" == "Windows" ]; then
            npx electron-builder --win
          else
            npx electron-builder --linux
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
          retention-days: 1

  release:
    name: Create Release
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Download Release Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: Release ${{ needs.bump-version.outputs.new_tag }}
          body_path: release_notes.md
          files: all-artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
